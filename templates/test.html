<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Викторина</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_quiz.css')}}">
</head>
<body>
    {% if question %}
    <h1>{{question}}</h1>
    {% endif %}
    <form method="post" action="/test">
        <input type="hidden" name="q_id" value="{{quest_id}}">
            <div class="outer-div">
                {% for answer in answers_list %}
                <div class="form_radio_btn">
                    <input type="radio" name="ans_text" value="{{ answer }}">{{ answer }}
                </div>
                {% endfor %}
                <div>
                    <p><button class="btn" type="submit" value="Відповісти">Відповісти</button></p>
                </div>
            </div>
    </form>
</body>
</html>
